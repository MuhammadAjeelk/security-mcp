id: ssh-private-key
info:
  name: SSH private key exposed
  severity: critical
  description: Private SSH keys served over HTTP — immediate credential compromise.
  tags: [secrets]
confidence: high
requests:
  - method: GET
    paths:
      - /id_rsa
      - /.ssh/id_rsa
      - /id_ed25519
    matchersCondition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words:
          - 'BEGIN OPENSSH PRIVATE KEY'
          - 'BEGIN RSA PRIVATE KEY'
        condition: or
