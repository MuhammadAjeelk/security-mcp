id: laravel-debug
info:
  name: Laravel Ignition debug page
  severity: critical
  description: Laravel's Ignition debug page can leak source and (CVE-2021-3129) allow RCE on older versions.
  tags: [configuration, laravel]
confidence: high
requests:
  - method: GET
    paths:
      - /
      - /_ignition/health-check
      - /_ignition/execute-solution
    # Require a 200 AND a distinctive Ignition marker. Without the status guard,
    # apps that echo the requested path in their 404 body (e.g. NestJS:
    # "Cannot GET /_ignition/...") falsely match the bare "_ignition" word.
    matchersCondition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words:
          - 'Whoops'
          - 'ignition.styles'
          - 'solutionProviders'
          - 'report_id'
        condition: or
