id: aws-credentials-file
info:
  name: AWS credentials file exposed
  severity: critical
  description: A .aws/credentials file served publicly leaks programmatic AWS access.
  tags: [secrets]
confidence: high
requests:
  - method: GET
    paths:
      - /.aws/credentials
      - /aws.json
      - /credentials
    matchersCondition: and
    matchers:
      - type: status
        status: [200]
      - type: regex
        part: body
        regex:
          - 'aws_access_key_id'
          - 'AKIA[0-9A-Z]{16}'
        condition: or
