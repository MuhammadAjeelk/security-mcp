id: cors-wildcard-credentials
info:
  name: CORS misconfiguration — wildcard + credentials
  severity: critical
  description: Combining Access-Control-Allow-Origin:* with credentials reveals dangerous intent (browsers reject but the misconfig often hides reflected-origin variants).
  tags: [headers, api]
confidence: high
requests:
  - method: GET
    paths:
      - /
      - /api
    matchersCondition: and
    matchers:
      - type: header
        header: access-control-allow-origin
        words: ['*']
      - type: header
        header: access-control-allow-credentials
        words: ['true']
